# Persona DB — Docker Compose
# ============================================================
# Deploys both Hermes Agent + Persona DB API with shared volume.
#
# Prerequisites:
#   1. Set PERSONA_DB_DATA to the extracted tarball directory
#   2. Set HERMES_HOME to the Hermes config directory
#
# Usage:
#   PERSONA_DB_DATA=/srv/persona-db-data docker compose up -d
# ============================================================

services:

  # ── Hermes Agent ──────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    network_mode: host
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    volumes:
      # Hermes config (skills, sessions, memories)
      - ${HERMES_HOME:-/home/ubuntu/.hermes}:/opt/data
      # Shared persona-db data (so `hermes chat` can run QA/tools)
      - ${PERSONA_DB_DATA:-/srv/persona-db-data}:/root/persona-db

  # ── Persona DB API ────────────────────────────────────────
  persona-db-api:
    build:
      context: ${PERSONA_DB_DATA:-/srv/persona-db-data}
      dockerfile: Dockerfile
    image: persona-db-api:latest
    container_name: persona-db-api
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    env_file:
      - ${PERSONA_DB_DATA:-/srv/persona-db-data}/.env
    volumes:
      # Shared persona-db data (same files Hermes sees at /root/persona-db)
      - ${PERSONA_DB_DATA:-/srv/persona-db-data}:/app
      # Hermes config (read-only, for LLM provider detection)
      - ${HERMES_HOME:-/home/ubuntu/.hermes}:/hermes-config:ro

    # Health check
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
